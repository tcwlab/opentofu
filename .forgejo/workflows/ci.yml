name: ci

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tcwlab/opentofu

jobs:

  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Smoke-Test (amd64)
    runs-on: ubuntu-22.04
    container:
      image: docker:27-cli
    services:
      dind:
        image: docker:27-dind
        env:
          DOCKER_TLS_CERTDIR: ""
        options: "--privileged"
    env:
      DOCKER_HOST: tcp://dind:2375
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .
      - name: Smoke-Test
        run: docker run --rm "${{ env.IMAGE }}:test" version

  # ---------------------------------------------------------------------------
  # Publish nur auf Git-Tag (v<tool-version>, z.B. v1.10.0).
  # Tag = Tool-Version → tcwlab/opentofu:1.10.0 + tcwlab/opentofu:latest
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to Docker Hub (linux/amd64 + linux/arm64)
    runs-on: ubuntu-22.04
    needs: [build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: docker:27-cli
    services:
      dind:
        image: docker:27-dind
        env:
          DOCKER_TLS_CERTDIR: ""
        options: "--privileged"
    env:
      DOCKER_HOST: tcp://dind:2375
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Extract tool version from tag
        id: version
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Install buildx
        run: |
          docker buildx version || \
            (apk add --no-cache curl && \
             mkdir -p ~/.docker/cli-plugins && \
             curl -fsSL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 \
               -o ~/.docker/cli-plugins/docker-buildx && \
             chmod +x ~/.docker/cli-plugins/docker-buildx)
          docker buildx version

      - name: Set up QEMU (arm64 emulation)
        run: |
          docker run --rm --privileged \
            multiarch/qemu-user-static --reset -p yes

      - name: Set up Buildx builder
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push (multi-arch)
        run: |
          VER="${{ steps.version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg TOFU_VERSION="${VER}" \
            -t "${{ env.IMAGE }}:latest" \
            -t "${{ env.IMAGE }}:${VER}" \
            --push \
            .
